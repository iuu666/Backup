name: Sync Rules

on:
  schedule:
    - cron: '0 3 * * *'   # 每天运行（UTC时间）
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

      - name: Install dependencies
        run: pip install requests

      - name: Run sync script
        run: python scripts/sync/sync.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Auto update rules" || echo "No changes"
          git push
