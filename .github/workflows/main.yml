name: Sync Rules

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 00:00 UTC（北京时间 08:00）自动触发
  workflow_dispatch:      # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout 仓库
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: 安装 Python
      - name: Setup Python
        uses: actions/setup-python@v5

      # Step 3: 安装依赖
      - name: Install dependencies
        run: pip install requests

      # Step 4: 执行同步脚本
      - name: Run sync script
        run: python scripts/sync/sync.py

      # Step 5: 检查是否有变化
      - name: Check changes
        id: check
        run: |
          if [ -f .changed ] && [ "$(cat .changed)" = "1" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # Step 6: 提交并推送更新（使用北京时间）
      - name: Commit changes
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Auto update rules - $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          git push

      # Step 7: 无变化时跳过提交
      - name: Skip commit
        if: steps.check.outputs.changed == 'false'
        run: echo "No changes, skip commit"
